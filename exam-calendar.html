<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e12;
    --surface: #16161d;
    --border: #2a2a38;
    --text: #e8e6f0;
    --muted: #6b6880;
    --accent: #c8b8ff;
    --accent2: #ffb8d9;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(120, 80, 255, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 85%, rgba(255, 80, 140, 0.06) 0%, transparent 60%);
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-style: italic;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .nav-btn:hover { border-color: var(--accent); background: rgba(200,184,255,0.08); }

  .month-label {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    min-width: 200px;
    text-align: center;
    letter-spacing: 0.01em;
  }

  .calendar-wrap {
    width: 100%;
    max-width: 760px;
  }

  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 5px;
  }
  .day-headers span {
    text-align: center;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 0;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }

  .day-cell {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
    overflow: visible;
  }
  .day-cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .day-cell:not(.empty):hover {
    transform: scale(1.06);
    border-color: rgba(200,184,255,0.5);
    box-shadow: 0 4px 20px rgba(120,80,255,0.18);
    z-index: 10;
  }
  .day-cell.today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }

  .day-num {
    position: absolute;
    top: 6px; left: 8px;
    font-size: 0.65rem;
    color: var(--muted);
    font-weight: 400;
    pointer-events: none;
    z-index: 1;
  }
  .day-cell.today .day-num { color: var(--accent); font-weight: 500; }

  /* Color fill overlay */
  .day-fill {
    position: absolute;
    inset: 0;
    border-radius: 9px;
    opacity: 0.55;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .day-cell:hover .day-fill { opacity: 0.7; }

  /* Tooltip */
  .tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 10px);
    left: 50%;
    transform: translateX(-50%);
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    white-space: nowrap;
    font-size: 0.7rem;
    color: var(--text);
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    min-width: 120px;
    text-align: center;
  }
  .tooltip::after {
    content: '';
    position: absolute;
    top: 100%; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--border);
  }
  .tooltip .t-name { font-weight: 500; color: var(--accent); display: block; margin-bottom: 2px; }
  .tooltip .t-color { font-size: 0.6rem; color: var(--muted); }
  .day-cell:not(.empty):hover .tooltip { display: block; }

  /* Modal */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
    width: min(400px, 92vw);
    position: relative;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.94) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    margin-bottom: 4px;
  }
  .modal .modal-date {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .field-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
    display: block;
  }

  .field-group { margin-bottom: 18px; }

  input[type="text"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .color-palette {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .color-swatch {
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.selected {
    border-color: white;
    transform: scale(1.15);
  }
  .color-swatch.selected::after {
    content: '✓';
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    color: white;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    transition: background 0.2s, border-color 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-save {
    background: linear-gradient(135deg, rgba(200,184,255,0.2), rgba(255,184,217,0.15));
    border-color: rgba(200,184,255,0.4);
    color: var(--accent);
  }
  .btn-save:hover { background: rgba(200,184,255,0.25); border-color: var(--accent); }
  .btn-clear {
    background: transparent;
    color: var(--muted);
  }
  .btn-clear:hover { border-color: #ff6b6b; color: #ff6b6b; background: rgba(255,107,107,0.08); }
  .btn-cancel {
    background: transparent;
    color: var(--muted);
    flex: 0.6;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  .close-btn {
    position: absolute;
    top: 14px; right: 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }

  /* Legend */
  .legend {
    margin-top: 28px;
    width: 100%; max-width: 760px;
  }
  .legend-title {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .legend-items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px 5px 8px;
    font-size: 0.7rem;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .no-exams {
    color: var(--muted);
    font-size: 0.72rem;
    font-style: italic;
  }
</style>
</head>
<body>

<header>
  <h1>Exam Planner</h1>
  <p>click a day to assign an exam &amp; colour</p>
</header>

<div class="controls">
  <button class="nav-btn" id="prevBtn">&#8592;</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="nav-btn" id="nextBtn">&#8594;</button>
</div>

<div class="calendar-wrap">
  <div class="day-headers">
    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
    <span>Thu</span><span>Fri</span><span>Sat</span>
  </div>
  <div class="calendar-grid" id="calGrid"></div>
</div>

<div class="legend" id="legend">
  <div class="legend-title">Scheduled Exams</div>
  <div class="legend-items" id="legendItems"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close-btn" id="closeBtn">&#10005;</button>
    <h2 id="modalTitle">Assign Exam</h2>
    <div class="modal-date" id="modalDateLabel"></div>

    <div class="field-group">
      <label class="field-label">Exam name</label>
      <input type="text" id="examInput" placeholder="e.g. Linear Algebra, Physics II…" />
    </div>

    <div class="field-group">
      <label class="field-label">Colour</label>
      <div class="color-palette" id="colorPalette"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn btn-clear" id="clearBtn">Clear Day</button>
      <button class="btn btn-save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
const COLORS = [
  { name: 'Violet',   hex: '#9b72ff' },
  { name: 'Rose',     hex: '#ff6ba8' },
  { name: 'Amber',    hex: '#ffb347' },
  { name: 'Teal',     hex: '#4ecdc4' },
  { name: 'Sky',      hex: '#5bb8f5' },
  { name: 'Lime',     hex: '#8edb7a' },
  { name: 'Peach',    hex: '#ff9b85' },
  { name: 'Lavender', hex: '#c4a8ff' },
  { name: 'Mint',     hex: '#7fffcf' },
  { name: 'Coral',    hex: '#ff6f61' },
  { name: 'Gold',     hex: '#ffd700' },
  { name: 'Pink',     hex: '#ff85d0' },
];

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();
let selected = { year: null, month: null, day: null };
let selectedColor = COLORS[0].hex;

// data: key = "YYYY-M-D" => { name, color }
let data = JSON.parse(localStorage.getItem('examCalData') || '{}');

function save() { localStorage.setItem('examCalData', JSON.stringify(data)); }
function key(y, m, d) { return `${y}-${m}-${d}`; }

// Build palette
const palette = document.getElementById('colorPalette');
COLORS.forEach(c => {
  const sw = document.createElement('button');
  sw.className = 'color-swatch';
  sw.style.background = c.hex;
  sw.title = c.name;
  sw.dataset.hex = c.hex;
  sw.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    sw.classList.add('selected');
    selectedColor = c.hex;
  });
  palette.appendChild(sw);
});

function render() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'day-cell empty';
    grid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell';
    const k = key(viewYear, viewMonth, d);
    const exam = data[k];

    const isToday = (d === now.getDate() && viewMonth === now.getMonth() && viewYear === now.getFullYear());
    if (isToday) cell.classList.add('today');

    // Day number
    const num = document.createElement('span');
    num.className = 'day-num';
    num.textContent = d;
    cell.appendChild(num);

    // Color fill
    if (exam) {
      const fill = document.createElement('div');
      fill.className = 'day-fill';
      fill.style.background = exam.color;
      cell.appendChild(fill);
    }

    // Tooltip
    const tip = document.createElement('div');
    tip.className = 'tooltip';
    if (exam) {
      tip.innerHTML = `<span class="t-name">${exam.name}</span><span class="t-color">${getColorName(exam.color)}</span>`;
    } else {
      tip.innerHTML = `<span class="t-color">No exam — click to add</span>`;
    }
    cell.appendChild(tip);

    cell.addEventListener('click', () => openModal(d));
    grid.appendChild(cell);
  }

  renderLegend();
}

function getColorName(hex) {
  const c = COLORS.find(c => c.hex === hex);
  return c ? c.name : hex;
}

function renderLegend() {
  const container = document.getElementById('legendItems');
  container.innerHTML = '';

  // Collect unique exams in this month
  const seen = {};
  for (let d = 1; d <= 31; d++) {
    const k = key(viewYear, viewMonth, d);
    const exam = data[k];
    if (exam && !seen[exam.name]) {
      seen[exam.name] = exam.color;
    }
  }

  const names = Object.keys(seen);
  if (names.length === 0) {
    container.innerHTML = '<span class="no-exams">No exams scheduled this month.</span>';
    return;
  }

  names.forEach(name => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-dot" style="background:${seen[name]}"></div>${name}`;
    container.appendChild(item);
  });
}

function openModal(day) {
  selected = { year: viewYear, month: viewMonth, day };
  const k = key(viewYear, viewMonth, day);
  const exam = data[k];

  document.getElementById('examInput').value = exam ? exam.name : '';
  selectedColor = exam ? exam.color : COLORS[0].hex;

  // Update palette selection
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.hex === selectedColor);
  });

  const dateObj = new Date(viewYear, viewMonth, day);
  document.getElementById('modalDateLabel').textContent =
    `${DAYS_SHORT[dateObj.getDay()]}, ${MONTHS[viewMonth]} ${day}, ${viewYear}`;

  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('examInput').focus(), 50);
}

function closeModal() {
  document.getElementById('modalBg').classList.remove('open');
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const name = document.getElementById('examInput').value.trim();
  if (!name) { document.getElementById('examInput').focus(); return; }
  const k = key(selected.year, selected.month, selected.day);
  data[k] = { name, color: selectedColor };
  save();
  closeModal();
  render();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  const k = key(selected.year, selected.month, selected.day);
  delete data[k];
  save();
  closeModal();
  render();
});

document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

document.getElementById('examInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('saveBtn').click();
  if (e.key === 'Escape') closeModal();
});

document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  render();
});

render();
</script>
</body>
</html>
